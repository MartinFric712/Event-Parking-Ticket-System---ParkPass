<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkPass — Book Concert Tickets</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0f1e;
      --navy-mid: #111827;
      --navy-light: #1a2238;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --cream: #f5f0e8;
      --muted: #8892a4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px; height: 72px;
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--gold); letter-spacing: 1px;
    }
    .brand span { color: var(--cream); }

    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: var(--muted); font-size: 0.875rem; font-weight: 500;
      padding: 8px 16px; border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--cream); background: var(--gold-dim); }
    .nav-links a.active { color: var(--gold); }
    .nav-cta {
      background: var(--gold); color: var(--navy) !important;
      font-weight: 600 !important; padding: 8px 20px !important; border-radius: 6px;
    }
    .nav-cta:hover { background: var(--gold-light) !important; }

    .page-header {
      padding: 120px 56px 60px;
      max-width: 1200px; margin: 0 auto;
    }

    .eyebrow {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 4.5vw, 3.5rem);
      font-weight: 700; color: var(--cream); line-height: 1.1;
    }

    .page-header p {
      color: var(--muted); font-size: 1rem; margin-top: 16px; max-width: 480px; line-height: 1.7;
    }

    .concerts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      max-width: 1200px; margin: 0 auto;
      padding: 0 56px 100px;
    }

    .concert-card {
      background: var(--navy-mid);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }
    .concert-card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 48px rgba(0,0,0,0.4);
    }

    .concert-banner {
      height: 200px;
      position: relative; overflow: hidden;
    }

    .concert-banner img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }

    .concert-card:hover .concert-banner img {
      transform: scale(1.05);
    }

    .concert-banner::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
      background: linear-gradient(transparent, var(--navy-mid));
      z-index: 1;
    }

    .banner-genre {
      position: absolute; top: 12px; left: 12px; z-index: 2;
      background: rgba(10,15,30,0.7); backdrop-filter: blur(6px);
      color: var(--gold); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid rgba(201,168,76,0.3);
    }

    .concert-body { padding: 24px; }

    .concert-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem; font-weight: 700;
      color: var(--cream); margin-bottom: 4px;
    }

    .concert-artist { color: var(--muted); font-size: 0.875rem; margin-bottom: 20px; }

    .concert-meta {
      display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
    }

    .meta-row {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 0.85rem;
    }
    .meta-row .icon { font-size: 0.9rem; width: 18px; }

    .concert-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 20px; border-top: 1px solid rgba(201,168,76,0.1);
    }

    .price-tag {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700; color: var(--gold);
    }
    .price-tag small { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--muted); display: block; font-weight: 400; }

    .btn-book {
      background: var(--gold); color: var(--navy);
      border: none; padding: 10px 24px;
      border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-book:hover { background: var(--gold-light); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      z-index: 200; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--navy-light);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px; padding: 40px;
      width: 100%; max-width: 480px; position: relative;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute; top: 20px; right: 20px;
      background: var(--gold-dim); border: none;
      width: 32px; height: 32px; border-radius: 50%;
      color: var(--cream); font-size: 1rem; cursor: pointer; line-height: 32px; text-align: center;
    }
    .modal-close:hover { background: rgba(201,168,76,0.3); }

    .modal-eyebrow { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700; color: var(--cream); margin-bottom: 28px;
    }

    .form-field { margin-bottom: 18px; }
    .form-field label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--muted); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase;
    }
    .form-field input, .form-field select {
      width: 100%; padding: 12px 16px;
      background: var(--navy-mid); border: 1px solid rgba(201,168,76,0.15);
      border-radius: 8px; color: var(--cream);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .form-field input:focus, .form-field select:focus {
      outline: none; border-color: var(--gold);
    }
    .form-field input::placeholder { color: #4a5568; }
    .form-field select option { background: var(--navy-mid); }

    .ticket-types {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px;
    }
    .ticket-type {
      background: var(--navy-mid); border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px; padding: 14px 10px; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .ticket-type:hover { border-color: rgba(201,168,76,0.4); }
    .ticket-type.selected { background: var(--gold-dim); border-color: var(--gold); }
    .ticket-type .tt-name { font-weight: 600; font-size: 0.85rem; color: var(--cream); }
    .ticket-type .tt-price { font-size: 0.75rem; color: var(--gold); margin-top: 4px; }

    .btn-submit {
      width: 100%; background: var(--gold); color: var(--navy);
      border: none; padding: 14px;
      border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 24px;
      transition: all 0.2s;
    }
    .btn-submit:hover { background: var(--gold-light); }

    footer {
      border-top: 1px solid rgba(201,168,76,0.15);
      padding: 32px 56px; display: flex;
      justify-content: space-between; align-items: center;
    }
    footer p { color: var(--muted); font-size: 0.85rem; }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .page-header { padding: 100px 24px 40px; }
      .concerts-grid { padding: 0 24px 60px; gap: 16px; }
      .modal { padding: 28px 20px; }
      footer { flex-direction: column; gap: 12px; padding: 28px 24px; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="home.html"><div class="brand">Park<span>Pass</span></div></a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="book.html" class="active">Book Tickets</a>
    <a href="parking.html">Parking</a>
    <a href="account.html">Account</a>
    <a href="parking.html" class="nav-cta">Reserve Parking</a>
  </div>
</nav>

<div class="page-header">
  <p class="eyebrow">Upcoming Events</p>
  <h1>Book Your Tickets</h1>
  <p>Choose from our curated lineup of live events. Select your tier, fill in your details, and we'll handle the rest.</p>
</div>

<div class="concerts-grid" id="concerts-grid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <p class="modal-eyebrow">Reserve Your Seat</p>
    <h2 class="modal-title" id="modal-title"></h2>

    <div class="form-field">
      <label>Full Name</label>
      <input type="text" id="f-name" placeholder="Your full name">
    </div>
    <div class="form-field">
      <label>Email Address</label>
      <input type="email" id="f-email" placeholder="you@example.com">
    </div>
    <div class="form-field">
      <label>Phone</label>
      <input type="tel" id="f-phone" placeholder="+1 (555) 000-0000">
    </div>
    <div class="form-field">
      <label>Ticket Tier</label>
      <div class="ticket-types" id="ticket-types"></div>
    </div>

    <button class="btn-submit" onclick="submitBooking()">Confirm Booking</button>
  </div>
</div>

<footer>
  <div class="brand">Park<span>Pass</span></div>
  <p>&copy; 2026 ParkPass. All rights reserved.</p>
</footer>

<script>
  const concerts = [
    { id:1, name:'Summer Vibes Festival', artist:'Various Artists', date:'July 15, 2026', venue:'Central Park', price:85, genre:'Festival', photo:'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=600&q=80' },
    { id:2, name:'Midnight Dreams Tour', artist:'Luna Eclipse', date:'June 22, 2026', venue:'Downtown Arena', price:120, genre:'Pop', photo:'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=600&q=80' },
    { id:3, name:'Rock Revolution', artist:'Thunder Strike', date:'August 10, 2026', venue:'Grand Stadium', price:95, genre:'Rock', photo:'https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=600&q=80' },
    { id:4, name:'Jazz Night Special', artist:'Blue Notes Collective', date:'July 28, 2026', venue:'Riverside Theater', price:75, genre:'Jazz', photo:'https://images.unsplash.com/photo-1415201364774-f6f0bb35f28f?w=600&q=80' },
    { id:5, name:'Pop Extravaganza', artist:'Starlight Collective', date:'September 5, 2026', venue:'Metropolis Hall', price:110, genre:'Pop', photo:'https://images.unsplash.com/photo-1429962714451-bb934ecdc4ec?w=600&q=80' },
    { id:6, name:'Electronic Beats Fest', artist:'Synth Masters', date:'August 20, 2026', venue:'Fashion District', price:100, genre:'Electronic', photo:'https://www.electronic-festivals.com/sites/default/files/ade_20181021_liekevandenoord_ade_projectone_lowres_lvdo6096.jpg' }
  ];

  const tiers = [
    { name:'General', add:0 },
    { name:'VIP', add:50 },
    { name:'Premium', add:100 }
  ];

  let activeConcert = null, activeTier = null;

  function renderConcerts() {
    document.getElementById('concerts-grid').innerHTML = concerts.map(c => `
      <div class="concert-card">
        <div class="concert-banner">
          <img src="${c.photo}" alt="${c.name}" loading="lazy">
          <span class="banner-genre">${c.genre}</span>
        </div>
        <div class="concert-body">
          <h3 class="concert-title">${c.name}</h3>
          <p class="concert-artist">${c.artist}</p>
          <div class="concert-meta">
            <div class="meta-row"><span class="icon">📅</span>${c.date}</div>
            <div class="meta-row"><span class="icon">📍</span>${c.venue}</div>
          </div>
          <div class="concert-footer">
            <div class="price-tag">$${c.price}<small>from / ticket</small></div>
            <button class="btn-book" onclick="openModal(${c.id})">Book Now</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openModal(id) {
    activeConcert = concerts.find(c => c.id === id);
    activeTier = null;
    document.getElementById('modal-title').textContent = activeConcert.name;
    document.getElementById('ticket-types').innerHTML = tiers.map(t => `
      <div class="ticket-type" onclick="selectTier(this,'${t.name}',${t.add})">
        <div class="tt-name">${t.name}</div>
        <div class="tt-price">+$${t.add}</div>
      </div>
    `).join('');
    document.getElementById('modal').classList.add('open');
  }

  function selectTier(el, name, add) {
    activeTier = { name, add };
    document.querySelectorAll('.ticket-type').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function submitBooking() {
    const name = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    if (!name || !email) { alert('Please fill in your name and email.'); return; }
    if (!activeTier) { alert('Please select a ticket tier.'); return; }
    const total = activeConcert.price + activeTier.add;
    alert(`✅ Booking confirmed!\n\n${activeConcert.name}\n${activeTier.name} Ticket — $${total}\n\nConfirmation sent to ${email}`);
    closeModal();
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });

  renderConcerts();
</script>
</body>
</html>
