<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub - Book Concert Tickets</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #2c3e50;
      color: #333;
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      min-height: 70px;
      background: #34495e;
      border-bottom: 2px solid #2c3e50;
    }

    .brand {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ecf0f1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand::before {
      content: "🎪";
      font-size: 1.5rem;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-links a {
      color: #ecf0f1;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 4px;
    }

    .nav-links a:hover {
      color: #3498db;
      background: #2c3e50;
    }

    .container {
      padding: 100px 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 30px;
      text-align: center;
      color: #ecf0f1;
    }

    .concerts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }

    .concert-card {
      background: white;
      border: 1px solid #bdc3c7;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .concert-poster {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
    }

    .concert-card:nth-child(2) .concert-poster {
      background: linear-gradient(135deg, #4ecdc4 0%, #44a98d 100%);
    }

    .concert-card:nth-child(3) .concert-poster {
      background: linear-gradient(135deg, #f9ca24 0%, #f0932b 100%);
    }

    .concert-card:nth-child(4) .concert-poster {
      background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
    }

    .concert-card:nth-child(5) .concert-poster {
      background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
    }

    .concert-card:nth-child(6) .concert-poster {
      background: linear-gradient(135deg, #55efc4 0%, #38ada9 100%);
    }

    .concert-details {
      padding: 20px;
    }

    .concert-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 6px;
      color: #2c3e50;
    }

    .concert-artist {
      color: #666;
      margin: 0 0 12px;
      font-size: 0.9rem;
    }

    .concert-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #666;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.8);
    }

    .ticket-price {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 12px 0;
      color: #e74c3c;
    }

    .book-btn {
      width: 100%;
      background: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    .book-btn:hover {
      background: #2980b9;
    }

    .booking-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .booking-modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border: 1px solid #bdc3c7;
      border-radius: 6px;
      padding: 30px;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #333;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .close-btn:hover {
      color: #e74c3c;
    }

    .modal-title {
      font-size: 1.6rem;
      margin: 0 0 20px;
      font-weight: 700;
      color: #2c3e50;
    }

    .booking-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 6px;
      color: #2c3e50;
      font-size: 0.9rem;
      display: block;
    }

    .form-group input,
    .form-group select {
      padding: 8px 12px;
      border: 1px solid #bdc3c7;
      border-radius: 4px;
      background: white;
      color: #333;
      font-size: 0.9rem;
      width: 100%;
    }

    .form-group input::placeholder {
      color: #999;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 3px rgba(52, 152, 219, 0.3);
    }

    .ticket-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .ticket-option {
      border: 2px solid #bdc3c7;
      border-radius: 4px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: white;
      color: #333;
    }

    .ticket-option:hover {
      border-color: #3498db;
      background: #ecf0f1;
    }

    .ticket-option.selected {
      background: #3498db;
      color: white;
      border-color: #2980b9;
    }

    .ticket-type {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .ticket-count {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .btn-submit {
      background: #3498db;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 16px;
      width: 100%;
    }

    .btn-submit:hover {
      background: #2980b9;
    }

    footer {
      background: #34495e;
      padding: 30px 40px 20px;
      text-align: center;
      color: #ecf0f1;
      font-size: 0.85rem;
      border-top: 2px solid #2c3e50;
      margin-top: 60px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 100px 20px 60px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .concerts-grid {
        gap: 20px;
      }

      .modal-content {
        padding: 24px;
      }

      .topbar {
        padding: 0 20px;
        min-height: 70px;
      }

      .nav-links {
        gap: 16px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="brand">EventHub</div>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="book.html">Book Tickets</a>
      <a href="parking.html">Parking</a>
      <a href="account.html">Account</a>
    </div>
  </div>

  <div class="container">
    <h1>🎵 Book Concert Tickets</h1>

    <div class="concerts-grid" id="concerts-grid">
      <!-- Concert cards will be generated by JavaScript -->
    </div>
  </div>

  <div class="booking-modal" id="booking-modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeBooking()">&times;</button>
      <h2 class="modal-title" id="modal-concert-name"></h2>
      
      <form class="booking-form" id="booking-form">
        <div class="form-group">
          <label for="attendee-name">Full Name</label>
          <input type="text" id="attendee-name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
          <label for="attendee-email">Email</label>
          <input type="email" id="attendee-email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="attendee-phone">Phone Number</label>
          <input type="tel" id="attendee-phone" placeholder="Your phone number" required>
        </div>

        <div class="form-group">
          <label>Ticket Type</label>
          <div class="ticket-selector" id="ticket-selector">
            <!-- Ticket options will be generated -->
          </div>
        </div>

        <button type="submit" class="btn-submit">Complete Booking</button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 EventHub. All rights reserved.</p>
  </footer>

  <script>
    const concerts = [
      {
        id: 1,
        name: 'Summer Vibes Festival',
        artist: 'Various Artists',
        date: '2026-07-15',
        venue: 'Central Park',
        price: 85,
        icon: '🎸'
      },
      {
        id: 2,
        name: 'Midnight Dreams Tour',
        artist: 'Luna Eclipse',
        date: '2026-06-22',
        venue: 'Downtown Arena',
        price: 120,
        icon: '🌙'
      },
      {
        id: 3,
        name: 'Rock Revolution',
        artist: 'Thunder Strike',
        date: '2026-08-10',
        venue: 'Grand Stadium',
        price: 95,
        icon: '⚡'
      },
      {
        id: 4,
        name: 'Jazz Night Special',
        artist: 'Blue Notes Collective',
        date: '2026-07-28',
        venue: 'Riverside Theater',
        price: 75,
        icon: '🎷'
      },
      {
        id: 5,
        name: 'Pop Extravaganza',
        artist: 'Starlight Collective',
        date: '2026-09-05',
        venue: 'Metropolis Hall',
        price: 110,
        icon: '✨'
      },
      {
        id: 6,
        name: 'Electronic Beats Fest',
        artist: 'Synth Masters',
        date: '2026-08-20',
        venue: 'Fashion District',
        price: 100,
        icon: '🎹'
      }
    ];

    const ticketTypes = [
      { type: 'General', price: 0 },
      { type: 'VIP', price: 50 },
      { type: 'Premium', price: 100 }
    ];

    let selectedConcert = null;
    let selectedTicketType = null;

    function renderConcerts() {
      const grid = document.getElementById('concerts-grid');
      grid.innerHTML = concerts.map(concert => `
        <div class="concert-card">
          <div class="concert-poster">${concert.icon}</div>
          <div class="concert-details">
            <h3 class="concert-title">${concert.name}</h3>
            <p class="concert-artist">by ${concert.artist}</p>
            <div class="concert-info">
              <div class="info-item">📅 ${concert.date}</div>
              <div class="info-item">📍 ${concert.venue}</div>
            </div>
            <div class="ticket-price">$${concert.price}</div>
            <button class="book-btn" onclick="openBooking(${concert.id})">Book Now</button>
          </div>
        </div>
      `).join('');
    }

    function openBooking(concertId) {
      selectedConcert = concerts.find(c => c.id === concertId);
      selectedTicketType = null;
      
      document.getElementById('modal-concert-name').textContent = selectedConcert.name;
      
      const selector = document.getElementById('ticket-selector');
      selector.innerHTML = ticketTypes.map(ticket => `
        <div class="ticket-option" onclick="selectTicketType('${ticket.type}')">
          <div class="ticket-type">${ticket.type}</div>
          <div class="ticket-count">+$${ticket.price}</div>
        </div>
      `).join('');
      
      document.getElementById('booking-modal').classList.add('active');
    }

    function closeBooking() {
      document.getElementById('booking-modal').classList.remove('active');
      document.getElementById('booking-form').reset();
    }

    function selectTicketType(type) {
      selectedTicketType = type;
      document.querySelectorAll('.ticket-option').forEach(opt => {
        opt.classList.remove('selected');
      });
      event.target.closest('.ticket-option').classList.add('selected');
    }

    document.getElementById('booking-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      if (!selectedTicketType) {
        alert('Please select a ticket type');
        return;
      }

      const name = document.getElementById('attendee-name').value;
      const totalPrice = selectedConcert.price + (ticketTypes.find(t => t.type === selectedTicketType)?.price || 0);
      
      alert(`✅ Booking confirmed!\n\nConcert: ${selectedConcert.name}\nTicket Type: ${selectedTicketType}\nTotal: $${totalPrice}\n\nConfirmation email sent to ${document.getElementById('attendee-email').value}`);
      
      closeBooking();
    });

    // Initialize
    renderConcerts();

    // Close modal when clicking outside
    document.getElementById('booking-modal').addEventListener('click', (e) => {
      if (e.target.id === 'booking-modal') {
        closeBooking();
      }
    });
  </script>

</body>

</html>
