<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkPass — Reserve Parking</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'DM Sans', sans-serif; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px; height: 72px;
      background: rgba(10,15,30,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700;
      color: #c9a84c; letter-spacing: 1px; text-decoration: none;
    }
    .brand span { color: #f5f0e8; }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: #8892a4; font-size: 0.875rem; font-weight: 500;
      padding: 8px 16px; border-radius: 6px;
      transition: all 0.2s; text-decoration: none;
    }
    .nav-links a:hover { color: #f5f0e8; background: rgba(201,168,76,0.15); }
    .nav-links a.active { color: #c9a84c; }
    .nav-cta {
      background: #c9a84c !important; color: #0a0f1e !important;
      font-weight: 600 !important; padding: 8px 20px !important; border-radius: 6px;
    }
    .nav-cta:hover { background: #e8c97a !important; }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
    }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links a { padding: 6px 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body class="bg-[#0a0f1e] text-white min-h-screen">

  <!-- Nav -->
  <nav>
    <a href="home.html" class="brand">Park<span>Pass</span></a>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="book.html">Book Tickets</a>
      <a href="parking.html" class="active">Parking</a>
      <a href="account.html">Account</a>
      <a href="book.html" class="nav-cta">Book Tickets</a>
    </div>
  </nav>

  <!-- Page header -->
  <div class="pt-28 pb-6 px-6 text-center">
    <p class="text-[#c9a84c] text-xs font-semibold tracking-[3px] uppercase mb-3">
      Real-time Availability
    </p>
    <h1 class="text-4xl font-bold mb-3" style="font-family:'Playfair Display',serif; color:#f5f0e8;">
      Reserve Your Parking Spot
    </h1>
    <p class="text-[#8892a4] max-w-md mx-auto text-sm leading-relaxed">
      Fill in your details below to secure your parking spot at the venue.
    </p>
  </div>

  <!-- Form -->
  <div class="flex items-start justify-center px-6 pb-16">
    <div class="w-full max-w-2xl bg-[#111827] border border-[rgba(201,168,76,0.2)] rounded-3xl p-8 shadow-2xl relative overflow-hidden">

      <!-- Gold top line -->
      <div class="absolute top-0 left-0 right-0 h-[2px]"
           style="background: linear-gradient(90deg, transparent, #c9a84c, transparent)"></div>

      <div class="text-center mb-8">
        <p class="text-[#c9a84c] text-xs font-semibold tracking-[3px] uppercase mb-3">
          Parkovisko 4 • Event Parking
        </p>
        <h2 class="text-2xl font-bold" style="font-family:'Playfair Display',serif; color:#f5f0e8;">
          Rezervácia parkovania
        </h2>
      </div>

      <form id="reservationForm" class="space-y-5">

        <div class="grid md:grid-cols-2 gap-5">
          <div>
            <label class="block mb-2 text-xs font-semibold text-[#8892a4] uppercase tracking-wide">Meno</label>
            <input required name="firstName"
              class="w-full bg-[#0a0f1e] border border-[rgba(201,168,76,0.15)] rounded-xl px-4 py-3 text-[#f5f0e8] placeholder-[#3a4560] focus:outline-none focus:border-[#c9a84c] transition-colors"
              placeholder="Martin" />
          </div>
          <div>
            <label class="block mb-2 text-xs font-semibold text-[#8892a4] uppercase tracking-wide">Priezvisko</label>
            <input required name="lastName"
              class="w-full bg-[#0a0f1e] border border-[rgba(201,168,76,0.15)] rounded-xl px-4 py-3 text-[#f5f0e8] placeholder-[#3a4560] focus:outline-none focus:border-[#c9a84c] transition-colors"
              placeholder="Novák" />
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-5">
          <div>
            <label class="block mb-2 text-xs font-semibold text-[#8892a4] uppercase tracking-wide">Email</label>
            <input type="email" required name="email"
              class="w-full bg-[#0a0f1e] border border-[rgba(201,168,76,0.15)] rounded-xl px-4 py-3 text-[#f5f0e8] placeholder-[#3a4560] focus:outline-none focus:border-[#c9a84c] transition-colors"
              placeholder="email@gmail.com" />
          </div>
          <div>
            <label class="block mb-2 text-xs font-semibold text-[#8892a4] uppercase tracking-wide">Telefón</label>
            <input required name="phone"
              class="w-full bg-[#0a0f1e] border border-[rgba(201,168,76,0.15)] rounded-xl px-4 py-3 text-[#f5f0e8] placeholder-[#3a4560] focus:outline-none focus:border-[#c9a84c] transition-colors"
              placeholder="0900 000 000" />
          </div>
        </div>

        <div>
          <label class="block mb-2 text-xs font-semibold text-[#8892a4] uppercase tracking-wide">ŠPZ</label>
          <input required name="plate"
            class="w-full bg-[#0a0f1e] border border-[rgba(201,168,76,0.15)] rounded-xl px-4 py-3 text-[#f5f0e8] uppercase text-xl tracking-widest placeholder-[#3a4560] focus:outline-none focus:border-[#c9a84c] transition-colors"
            placeholder="BA123CD" />
        </div>

        <div class="grid md:grid-cols-2 gap-5">
          <div>
            <label class="block mb-2 text-xs font-semibold text-[#8892a4] uppercase tracking-wide">Začiatok rezervácie</label>
            <input type="datetime-local" required name="startTime"
              class="w-full bg-[#0a0f1e] border border-[rgba(201,168,76,0.15)] rounded-xl px-4 py-3 text-[#f5f0e8] focus:outline-none focus:border-[#c9a84c] transition-colors" />
          </div>
          <div>
            <label class="block mb-2 text-xs font-semibold text-[#8892a4] uppercase tracking-wide">Koniec rezervácie</label>
            <input type="datetime-local" required name="endTime"
              class="w-full bg-[#0a0f1e] border border-[rgba(201,168,76,0.15)] rounded-xl px-4 py-3 text-[#f5f0e8] focus:outline-none focus:border-[#c9a84c] transition-colors" />
          </div>
        </div>

        <button type="submit" id="submit-btn"
          class="w-full font-bold py-4 rounded-2xl text-lg transition-all"
          style="background:#c9a84c; color:#0a0f1e; font-family:'DM Sans',sans-serif;">
          Rezervovať parkovanie
        </button>

      </form>

      <div id="message" class="mt-6 text-center"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer style="border-top:1px solid rgba(201,168,76,0.15); padding:32px 56px; display:flex; justify-content:space-between; align-items:center;">
    <a href="home.html" class="brand" style="font-family:'Playfair Display',serif; font-size:1.1rem; color:#c9a84c; letter-spacing:1px; text-decoration:none; font-weight:700;">
      Park<span style="color:#f5f0e8;">Pass</span>
    </a>
    <p style="color:#8892a4; font-size:0.85rem;">&copy; 2026 ParkPass. Secure parking reservations made easy.</p>
  </footer>

  <script>
    const form    = document.getElementById("reservationForm");
    const message = document.getElementById("message");
    const btn     = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btn.textContent  = "Odosielam…";
      btn.style.opacity = "0.7";
      btn.disabled     = true;
      message.innerHTML = "";

      const formData = new FormData(form);
      const payload  = {
        firstName: formData.get("firstName"),
        lastName:  formData.get("lastName"),
        email:     formData.get("email"),
        phone:     formData.get("phone"),
        plate:     formData.get("plate").toUpperCase(),
        startTime: new Date(formData.get("startTime")).toISOString(),
        endTime:   new Date(formData.get("endTime")).toISOString(),
      };

      try {
        const response = await fetch("/api/reserve", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || "Rezervácia zlyhala");

        message.innerHTML = `
          <div style="background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.4);color:#2ecc71;border-radius:16px;padding:16px;">
            ✅ Rezervácia úspešná!<br>
            ID rezervácie: <strong>${data.businessId ?? "—"}</strong>
          </div>`;
        form.reset();

      } catch (err) {
        console.error(err);
        message.innerHTML = `
          <div style="background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.4);color:#e74c3c;border-radius:16px;padding:16px;">
            ❌ ${err.message}
          </div>`;
      } finally {
        btn.textContent   = "Rezervovať parkovanie";
        btn.style.opacity = "1";
        btn.disabled      = false;
      }
    });
  </script>

</body>
</html>
